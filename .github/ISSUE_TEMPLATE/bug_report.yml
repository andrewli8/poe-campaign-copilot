name: Bug report
description: Something in the overlay is broken or wrong.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What went wrong?
      description: What happened, and what did you expect instead? A sentence or two is fine.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Anything else? (optional)
      description: Steps to reproduce, your app version, or your log. For the log, right-click the tray icon, choose Open logs, and drag the file in here.
    validations:
      required: false
