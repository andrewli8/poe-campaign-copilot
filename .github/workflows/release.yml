name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Two platform build jobs each produce a signed bundle and upload it (plus its
# .sig) as an INTERNAL CI artifact. A final tag-gated `release` job merges both
# into ONE updater manifest (latest.json carries per-platform keys, so both
# platforms MUST land in a single file) and publishes the GitHub release. The
# build jobs run on every trigger (dispatch included) for compile coverage; only
# the tag-gated `release` job publishes user-facing assets.
jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Ed25519 updater signing key (Tauri v2 `createUpdaterArtifacts`). Consumed by
      # `npm run tauri build` below to produce the `.sig` sidecar next to the NSIS
      # installer. Both secrets already exist in the repo (password secret is empty
      # string, which is valid for an unencrypted private key).
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run tauri build
      # NOTE: this is a cargo workspace, so bundle output lands at the REPO-ROOT
      # `target/release/bundle/nsis/`, not `src-tauri/target/...`.
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          # Installer + its .sig, kept as an INTERNAL CI artifact: the `release`
          # job reads the .sig to embed its signature inline in latest.json, and
          # an untagged `workflow_dispatch` build can be downloaded and
          # test-installed before tagging. Only the .exe is published later.
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig

  build-linux:
    # Pinned to 22.04 (NOT ubuntu-latest): the AppImage inherits the build
    # host's glibc floor, so building on a newer base would raise the minimum
    # glibc and break older systems. 22.04 is the oldest base that still ships
    # WebKitGTK 4.1. (Per Tauri's AppImage build guidance.)
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      # `--bundles appimage` overrides the config's `targets: ["nsis"]` on this
      # runner only, so the Windows config stays untouched. AppImage is the only
      # Linux bundle Tauri's updater supports.
      - run: npm run tauri build -- --bundles appimage
      # Workspace build output lands at the REPO-ROOT target/, same convention
      # as the Windows job's nsis path.
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          # AppImage + its .sig, kept as an INTERNAL CI artifact (same rationale
          # as the Windows job). Only the .AppImage is published later.
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.sig

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - name: Generate merged latest.json update manifest
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"          # e.g. "v0.1.10"
          version="${tag#v}"                # -> "0.1.10"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Locate the signed artifacts. `-name '*.AppImage'` does not match the
          # `.AppImage.sig` sidecar (it ends in .sig), and `-name '*-setup.exe'`
          # does not match `.exe.sig`, so these stay unambiguous.
          exe="$(find dist-artifacts -name '*-setup.exe'        | head -n1)"
          win_sig="$(find dist-artifacts -name '*-setup.exe.sig' | head -n1)"
          app="$(find dist-artifacts -name '*.AppImage'         | head -n1)"
          lin_sig="$(find dist-artifacts -name '*.AppImage.sig'  | head -n1)"

          for f in "$exe" "$win_sig" "$app" "$lin_sig"; do
            if [ -z "$f" ] || [ ! -f "$f" ]; then
              echo "::error::Missing required release artifact (exe/AppImage or its .sig) - was signing configured?" >&2
              exit 1
            fi
          done

          # GitHub Releases serves asset download URLs with spaces replaced by
          # dots (e.g. "PoE Campaign Copilot_..." -> "PoE.Campaign.Copilot_..."),
          # confirmed against published assets. The updater fetches these URLs
          # directly, so the manifest MUST use the dot form.
          base="https://github.com/andrewli8/poe-campaign-copilot/releases/download/${tag}"
          win_url="${base}/$(basename "$exe" | tr ' ' '.')"
          lin_url="${base}/$(basename "$app" | tr ' ' '.')"

          # --rawfile reads each minisign signature block verbatim (it may span
          # multiple lines) into the JSON string.
          jq -n \
            --arg version "$version" \
            --arg pub_date "$pub_date" \
            --rawfile win_sig "$win_sig" \
            --arg win_url "$win_url" \
            --rawfile lin_sig "$lin_sig" \
            --arg lin_url "$lin_url" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "linux-x86_64":   { signature: $lin_sig, url: $lin_url }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        # User-facing release assets: the two installers/bundles plus the
        # updater manifest. `latest.json` embeds each bundle's Ed25519 signature
        # inline, so the standalone .sig sidecars are not published.
        with:
          files: |
            dist-artifacts/windows-installer/*.exe
            dist-artifacts/linux-appimage/*.AppImage
            latest.json
