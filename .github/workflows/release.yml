name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run tauri build
      - name: Compute release checksum
        shell: pwsh
        run: |
          Get-ChildItem -Path target/release/bundle/nsis/*.exe | ForEach-Object {
            Get-FileHash -Algorithm SHA256 $_.FullName | Format-List | Out-File -FilePath "$($_.FullName).sha256.txt"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: poe-campaign-copilot-windows-setup
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sha256.txt
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sha256.txt
