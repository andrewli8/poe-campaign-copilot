name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    env:
      # Ed25519 updater signing key (Tauri v2 `createUpdaterArtifacts`). Consumed by
      # `npm run tauri build` below to produce the `.sig` sidecar next to the NSIS
      # installer. Both secrets already exist in the repo (password secret is empty
      # string, which is valid for an unencrypted private key).
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run tauri build
      # NOTE: this is a cargo workspace, so bundle output lands at the REPO-ROOT
      # `target/release/bundle/nsis/`, not `src-tauri/target/...`. All globs below
      # match that existing convention.
      - name: Compute release checksum
        shell: pwsh
        run: |
          Get-ChildItem -Path target/release/bundle/nsis/*.exe | ForEach-Object {
            Get-FileHash -Algorithm SHA256 $_.FullName | Format-List | Out-File -FilePath "$($_.FullName).sha256.txt"
          }
      - name: Generate latest.json update manifest
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          # Tag ref name, e.g. "v0.1.2" -> version "0.1.2".
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''

          # Locate the signed installer + its minisign signature. Same glob root as
          # the checksum step above (repo-root target/, workspace build output).
          $exePath = Get-ChildItem -Path target/release/bundle/nsis/*.exe | Select-Object -First 1
          $sigPath = Get-ChildItem -Path target/release/bundle/nsis/*.exe.sig | Select-Object -First 1

          if (-not $exePath) { throw "No .exe found under target/release/bundle/nsis/" }
          if (-not $sigPath) { throw "No .exe.sig found under target/release/bundle/nsis/ - was createUpdaterArtifacts/signing env set?" }

          # Signature file content (minisign base64 text block) becomes the JSON
          # "signature" string verbatim.
          $signature = Get-Content -Path $sigPath.FullName -Raw

          # IMPORTANT: the file on disk keeps the human-readable name with spaces,
          # e.g. "PoE Campaign Copilot_0.1.2_x64-setup.exe". GitHub Releases replaces
          # spaces with dots when it serves/publishes the asset download URL, e.g.
          # "PoE.Campaign.Copilot_0.1.2_x64-setup.exe" (confirmed against the actual
          # v0.1.1 published asset). The updater fetches this URL directly, so it
          # MUST use the dot form, not the on-disk space form.
          $assetName = $exePath.Name -replace ' ', '.'
          $url = "https://github.com/andrewli8/poe-campaign-copilot/releases/download/$tag/$assetName"

          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $manifest = [PSCustomObject]@{
            version   = $version
            pub_date  = $pubDate
            platforms = [PSCustomObject]@{
              "windows-x86_64" = [PSCustomObject]@{
                signature = $signature
                url       = $url
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path latest.json -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content latest.json
      - uses: actions/upload-artifact@v4
        with:
          name: poe-campaign-copilot-windows-setup
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sha256.txt
            target/release/bundle/nsis/*.exe.sig
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sha256.txt
            target/release/bundle/nsis/*.exe.sig
            latest.json
